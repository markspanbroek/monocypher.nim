name: CI

on: [push]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    steps:
    - uses: actions/checkout@v2
    - uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: 2.2.10
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Build
      run: nimble install -y
    - name: Test
      run: nimble test
